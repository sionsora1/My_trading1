<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股量化交易系统 v2.0</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --border: #334155;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --yellow: #eab308;
            --radius: 8px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }

        /* ---- Header ---- */
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: 0.5px; }
        .header .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .header .status-dot.offline { background: var(--red); animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ---- Tabs ---- */
        .tabs {
            display: flex;
            gap: 2px;
            background: #0b1120;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .tabs button {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 14px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: var(--font);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tabs button:hover { color: var(--text); }
        .tabs button.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        /* ---- Main Container ---- */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ---- Cards ---- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-header {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header span.icon { margin-right: 8px; }

        /* ---- Metrics Grid ---- */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .metric-value.green { color: var(--green); }
        .metric-value.red { color: var(--red); }
        .metric-label {
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        /* ---- Tables ---- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table tbody tr:hover { background: var(--bg-hover); }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-yellow { color: var(--yellow); }
        .text-blue { color: var(--blue); }
        .text-dim { color: var(--text-dim); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-buy { background: #064e3b; color: var(--green); }
        .badge-sell { background: #7f1d1d; color: var(--red); }
        .badge-hold { background: #334155; color: var(--text-dim); }

        /* ---- Buttons ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font);
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-sm { padding: 4px 12px; font-size: 0.78rem; }
        .btn-green { background: #166534; color: var(--green); }
        .btn-green:hover { background: #14532d; }
        .btn-red { background: #7f1d1d; color: var(--red); }
        .btn-red:hover { background: #991b1b; }
        .btn-blue { background: #1e3a5f; color: var(--blue); }
        .btn-blue:hover { background: #1e40af; color: #93c5fd; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }
        .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        /* ---- Forms ---- */
        input, select {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 8px 12px;
            font-size: 0.85rem;
            font-family: var(--font);
            outline: none;
        }
        input:focus, select:focus { border-color: var(--blue); }
        .form-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .form-row label { font-size: 0.82rem; color: var(--text-dim); min-width: 50px; }

        /* ---- Toast ---- */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            max-width: 420px;
            pointer-events: none;
        }
        .toast.success { background: #065f46; color: #6ee7b7; border: 1px solid #059669; }
        .toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; }
        .toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ---- Loading ---- */
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Empty state ---- */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .empty .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }

        /* ---- Profile card ---- */
        .profile-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-card);
        }
        .profile-card:hover { border-color: var(--blue); }
        .profile-card.selected { border-color: var(--blue); background: #1e3a5f; }
        .profile-card .name { font-weight: 600; }
        .profile-card .detail { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        /* ---- Auto-refresh indicator ---- */
        .refresh-indicator {
            font-size: 0.72rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .auto-badge {
            background: #1e3a5f;
            color: var(--blue);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.68rem;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <span class="status-dot" id="status-dot"></span>
            <h1 style="display:inline">A股量化交易系统 v2.0</h1>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/index.html" style="color:var(--text-dim);text-decoration:none;font-size:0.85rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;">🏠 主页</a>
            <div class="refresh-indicator">
                <span class="auto-badge">AUTO</span>
                <span id="refresh-countdown">30s</span>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs" id="tabs">
        <button class="active" onclick="switchTab('dashboard', this)">📡 仪表盘</button>
        <button onclick="switchTab('signals', this)">✅ 信号确认</button>
        <button onclick="switchTab('backtest', this)">📈 回测</button>
        <button onclick="switchTab('strategies', this)">⚙️ 策略配置</button>
        <button onclick="switchTab('logs', this)">📋 数据概览</button>
    </nav>

    <!-- Main Content -->
    <div class="main">

        <!-- ============ DASHBOARD ============ -->
        <div class="tab-panel active" id="panel-dashboard">
            <div class="metrics" id="dashboard-metrics"></div>
            <div class="card">
                <div class="card-header"><span><span class="icon">💼</span>持仓列表</span></div>
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr>
                            <th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th><th>盈亏%</th>
                        </tr></thead>
                        <tbody id="positions-table"></tbody>
                    </table>
                </div>
                <div id="positions-empty" class="empty" style="display:none">
                    <div class="icon">📭</div>
                    <div>暂无持仓</div>
                </div>
            </div>
        </div>

        <!-- ============ SIGNAL CONFIRMATION ============ -->
        <div class="tab-panel" id="panel-signals">
            <div class="card">
                <div class="card-header">
                    <span><span class="icon">🔔</span>待确认信号</span>
                    <button class="btn btn-sm btn-outline" onclick="loadSignals()">🔄 刷新</button>
                </div>
                <div style="overflow-x:auto">
                    <table>
                        <thead><tr>
                            <th>订单ID</th><th>代码</th><th>方向</th><th>价格</th><th>数量</th><th>时间</th><th>原因</th><th>操作</th>
                        </tr></thead>
                        <tbody id="signals-table"></tbody>
                    </table>
                </div>
                <div id="signals-empty" class="empty" style="display:none">
                    <div class="icon">✅</div>
                    <div>暂无待确认信号</div>
                </div>
            </div>

            <div class="card" id="fill-form-card">
                <div class="card-header"><span class="icon">✍️</span>录入成交</div>
                <div class="form-row">
                    <label>订单ID</label>
                    <input type="text" id="fill-order-id" placeholder="MANUAL_2024...">
                    <label>成交价</label>
                    <input type="number" id="fill-price" placeholder="0.00" step="0.01">
                    <label>成交数量</label>
                    <input type="number" id="fill-qty" placeholder="100" step="100">
                    <button class="btn btn-green" onclick="submitFill()">提交确认</button>
                </div>
                <small class="text-dim">提示：在东方财富App手动下单后，在此录入成交信息</small>
            </div>
        </div>

        <!-- ============ BACKTEST ============ -->
        <div class="tab-panel" id="panel-backtest">
            <div style="display:flex;gap:20px;flex-wrap:wrap;">
                <!-- LEFT COLUMN -->
                <div style="flex:1;min-width:340px;max-width:420px;">

                    <!-- Stock Pool -->
                    <div class="card">
                        <div class="card-header"><span class="icon">📦</span>股票池</div>
                        <div style="margin-bottom:8px;">
                            <select id="bt-preset-pool" style="width:100%;" onchange="btLoadPreset()">
                                <option value="">-- 选择预设股票池 --</option>
                                <option value="mixed">混合大小盘（5只）</option>
                                <option value="bluechip">沪深300龙头（5只）</option>
                                <option value="tech">科技成长（5只）</option>
                                <option value="smallcap">中小盘高alpha（5只）</option>
                                <option value="consumer">消费龙头（5只）</option>
                            </select>
                        </div>
                        <div id="bt-stock-tags" style="min-height:32px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px;"></div>
                        <div class="form-row" style="margin-bottom:6px;">
                            <input type="text" id="bt-stock-input" placeholder="输入6位代码" maxlength="6" style="width:100px;">
                            <button class="btn btn-sm btn-outline" onclick="btAddStock()">+ 添加</button>
                            <button class="btn btn-sm btn-outline" onclick="btClearPool()" style="color:var(--red);">清空</button>
                        </div>
                        <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:8px;">
                            快捷: <span style="cursor:pointer;color:var(--blue);" onclick="btQuickAdd('600519')">茅台</span> ·
                            <span style="cursor:pointer;color:var(--blue);" onclick="btQuickAdd('000858')">五粮液</span> ·
                            <span style="cursor:pointer;color:var(--blue);" onclick="btQuickAdd('002415')">海康</span> ·
                            <span style="cursor:pointer;color:var(--blue);" onclick="btQuickAdd('300750')">宁德</span> ·
                            <span style="cursor:pointer;color:var(--blue);" onclick="btQuickAdd('002230')">讯飞</span>
                        </div>
                        <div style="display:flex;gap:6px;margin-bottom:6px;">
                            <input type="text" id="bt-pool-name" placeholder="名称保存池" style="flex:1;font-size:0.8rem;">
                            <button class="btn btn-sm btn-green" onclick="btSavePool()">💾 保存</button>
                        </div>
                        <div id="bt-saved-pools" style="font-size:0.78rem;"></div>
                        <div style="display:flex;gap:4px;margin-top:8px;">
                            <button class="btn btn-sm btn-outline" onclick="btExportPool()">📥 导出</button>
                            <button class="btn btn-sm btn-outline" onclick="document.getElementById('bt-import-file').click()">📤 导入</button>
                            <input type="file" id="bt-import-file" accept=".json,.txt,.csv" style="display:none;" onchange="btImportPool(event)">
                            <button class="btn btn-sm btn-outline" onclick="btSyncFromLive()">⬇ 从实盘同步</button>
                            <button class="btn btn-sm btn-outline" onclick="btSyncToLive()">⬆ 同步到实盘</button>
                        </div>
                    </div>

                    <!-- Backtest Params -->
                    <div class="card">
                        <div class="card-header"><span class="icon">⚙️</span>回测参数</div>
                        <div class="form-row">
                            <label>开始</label><input type="text" id="bt-start" value="20260101" style="width:90px;">
                            <label>结束</label><input type="text" id="bt-end" value="20260531" style="width:90px;">
                        </div>
                        <div class="form-row">
                            <label>资金</label><input type="number" id="bt-capital" value="100000" style="width:100px;" step="10000">
                            <label>持仓</label><input type="number" id="bt-maxpos" value="5" min="1" max="20" style="width:60px;">
                        </div>
                        <div class="form-row">
                            <label>止损</label><input type="number" id="bt-stoploss" value="-8" min="-30" max="0" style="width:70px;">%
                            <label>止盈回撤</label><input type="number" id="bt-movestop" value="-10" min="-30" max="0" style="width:70px;">%
                            <label>调仓</label>
                            <select id="bt-rebalance"><option value="daily">日</option><option value="weekly" selected>周</option><option value="monthly">月</option></select>
                        </div>
                    </div>

                    <!-- Strategy Selection -->
                    <div class="card">
                        <div class="card-header"><span class="icon">🎯</span>选择策略</div>
                        <div id="bt-strategy-cards" style="display:flex;flex-direction:column;gap:6px;"></div>
                    </div>

                    <!-- Run Button -->
                    <button class="btn btn-blue" onclick="runBacktest()" style="width:100%;padding:14px;font-size:1rem;margin-bottom:12px;">▶ 开始回测</button>
                </div>

                <!-- RIGHT COLUMN: Results -->
                <div style="flex:2;min-width:500px;">
                    <!-- Loading -->
                    <div class="card" id="bt-loading-card" style="display:none;text-align:center;padding:40px;">
                        <div class="spinner"></div>
                        <div style="margin-top:12px;" id="bt-progress-msg">回测进行中...</div>
                        <div style="background:var(--border);height:4px;border-radius:2px;margin-top:12px;max-width:300px;margin-left:auto;margin-right:auto;">
                            <div id="bt-progress-bar" style="background:var(--blue);height:100%;width:0%;border-radius:2px;transition:width 0.3s;"></div>
                        </div>
                    </div>

                    <!-- Metrics -->
                    <div id="bt-metrics-area"></div>

                    <!-- Chart -->
                    <div class="card" id="bt-chart-card" style="display:none;">
                        <div class="card-header"><span class="icon">📊</span>净值曲线</div>
                        <div id="bt-chart" style="min-height:380px;"></div>
                    </div>

                    <!-- Daily Operations -->
                    <div class="card" id="bt-ops-card" style="display:none;">
                        <div class="card-header">
                            <span><span class="icon">📋</span>每日操作明细</span>
                            <select id="bt-date-selector" onchange="btLoadDailyOps()" style="font-size:0.82rem;"></select>
                        </div>
                        <div id="bt-daily-ops" style="max-height:500px;overflow-y:auto;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ STRATEGY CONFIG ============ -->
        <div class="tab-panel" id="panel-strategies">
            <div class="card">
                <div class="card-header"><span class="icon">🎯</span>已注册策略</div>
                <div class="strategy-grid" id="strategy-grid"></div>
                <div style="margin-top:12px; display:flex; gap:8px;">
                    <button class="btn btn-blue" onclick="applyCustomStrategies()">✅ 应用选中策略</button>
                    <span style="font-size:0.78rem;color:var(--text-dim);align-self:center;" id="custom-strat-hint">勾选后点击应用即可自定义策略组合</span>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span><span class="icon">📦</span>市场环境预设</span>
                    <span style="font-size:0.78rem; color:var(--text-dim);" id="manual-lock-badge"></span>
                </div>
                <div class="strategy-grid" id="profiles-grid"></div>
                <div style="margin-top:16px; display:flex; gap:8px;">
                    <button class="btn btn-blue" onclick="applySelectedProfile()">✅ 应用选中配置</button>
                    <button class="btn btn-outline" onclick="resetProfile()">🔄 恢复自动检测</button>
                </div>
            </div>
        </div>

        <!-- ============ LOGS / DATA STATUS ============ -->
        <div class="tab-panel" id="panel-logs">
            <div class="card">
                <div class="card-header">
                    <span><span class="icon">🗄️</span>数据库概览</span>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-sm btn-blue" onclick="syncDataToDB()">📥 同步缓存到数据库</button>
                        <button class="btn btn-sm btn-outline" onclick="loadDataStatus()">🔄 刷新</button>
                    </div>
                </div>
                <div class="metrics" id="data-metrics"></div>
            </div>
        </div>
    </div>

<script>
// ============================================================
// Global State
// ============================================================
const API_BASE = '/api'; // Same-origin (served by FastAPI)
let autoRefreshTimer = null;
let autoRefreshSec = 30;
let selectedProfileKey = null;
let signalAutoRefreshTimer = null;

// ============================================================
// Init
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
    loadDashboard();
    startAutoRefresh();
    checkServerStatus();
    // Init backtest pool from localStorage
    const lastPool = localStorage.getItem('bt_last_pool');
    if (lastPool) { try { btStockPool = JSON.parse(lastPool); } catch(e) {} }
    btRenderPool();
    btRenderStrategyCards();
});

// ============================================================
// Tab Switching
// ============================================================

function switchTab(tabName, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));

    const panel = document.getElementById('panel-' + tabName);
    if (panel) panel.classList.add('active');
    if (btn) btn.classList.add('active');

    // Lazy load on switch
    if (tabName === 'signals') {
        loadSignals();
        startSignalAutoRefresh();
    } else if (tabName === 'strategies') {
        loadStrategies();
        stopSignalAutoRefresh();
    } else if (tabName === 'logs') {
        loadDataStatus();
        stopSignalAutoRefresh();
    } else if (tabName === 'dashboard') {
        loadDashboard();
        stopSignalAutoRefresh();
    } else {
        stopSignalAutoRefresh();
    }
}

// ============================================================
// Dashboard
// ============================================================

async function loadDashboard() {
    try {
        const resp = await fetch(API_BASE + '/account');
        const json = await resp.json();
        if (json.status !== 'success') {
            renderDashboardEmpty(json.message || '无法获取账户数据');
            return;
        }
        renderDashboard(json.data);
    } catch (err) {
        renderDashboardEmpty('请求失败: ' + err.message);
    }
}

function renderDashboardEmpty(msg) {
    document.getElementById('dashboard-metrics').innerHTML = '';
    document.getElementById('positions-table').innerHTML = '';
    document.getElementById('positions-empty').style.display = 'block';
    if (msg) {
        document.getElementById('positions-empty').innerHTML = '<div class="icon">📡</div><div>' + msg + '</div>';
    }
}

function renderDashboard(data) {
    const m = data || {};
    const profitClass = (m.profit_rate || 0) >= 0 ? 'green' : 'red';
    const dailyClass = (m.daily_pnl || 0) >= 0 ? 'green' : 'red';

    document.getElementById('dashboard-metrics').innerHTML = `
        <div class="metric-card">
            <div class="metric-value">${fmtMoney(m.total_assets)}</div>
            <div class="metric-label">总资产</div>
        </div>
        <div class="metric-card">
            <div class="metric-value">${fmtMoney(m.cash)}</div>
            <div class="metric-label">可用资金</div>
        </div>
        <div class="metric-card">
            <div class="metric-value">${fmtMoney(m.market_value)}</div>
            <div class="metric-label">持仓市值</div>
        </div>
        <div class="metric-card">
            <div class="metric-value ${profitClass}">${(m.profit_rate || 0).toFixed(2)}%</div>
            <div class="metric-label">总收益率</div>
        </div>
        <div class="metric-card">
            <div class="metric-value ${dailyClass}">${fmtMoney(m.daily_pnl)}</div>
            <div class="metric-label">日盈亏</div>
        </div>
        <div class="metric-card">
            <div class="metric-value">${m.position_count || 0}</div>
            <div class="metric-label">持仓数</div>
        </div>
    `;

    const positions = m.positions || [];
    const tbody = document.getElementById('positions-table');
    const emptyDiv = document.getElementById('positions-empty');

    if (positions.length === 0) {
        tbody.innerHTML = '';
        emptyDiv.style.display = 'block';
        return;
    }

    emptyDiv.style.display = 'none';
    tbody.innerHTML = positions.map(p => {
        const pnlClass = (p.pnl || 0) >= 0 ? 'text-green' : 'text-red';
        const pnlPctClass = (p.pnl_pct || 0) >= 0 ? 'text-green' : 'text-red';
        return `<tr>
            <td>${esc(p.code)}</td>
            <td>${esc(p.name)}</td>
            <td>${fmtQty(p.qty)}</td>
            <td>${fmtPrice(p.cost)}</td>
            <td>${fmtPrice(p.price)}</td>
            <td>${fmtMoney(p.market_value)}</td>
            <td class="${pnlClass}">${fmtMoney(p.pnl)}</td>
            <td class="${pnlPctClass}">${(p.pnl_pct || 0).toFixed(2)}%</td>
        </tr>`;
    }).join('');
}

// Signal Confirmation
// ============================================================

async function loadSignals() {
    try {
        const resp = await fetch(API_BASE + '/signals/pending');
        const json = await resp.json();
        if (json.status !== 'success') {
            document.getElementById('signals-table').innerHTML = '';
            document.getElementById('signals-empty').style.display = 'block';
            document.getElementById('signals-empty').innerHTML = '<div class="icon">⚠️</div><div>' + (json.message || '加载失败') + '</div>';
            return;
        }
        renderSignals(json.data || []);
    } catch (err) {
        document.getElementById('signals-table').innerHTML = '';
        document.getElementById('signals-empty').style.display = 'block';
        document.getElementById('signals-empty').innerHTML = '<div class="icon">❌</div><div>请求失败: ' + err.message + '</div>';
    }
}

function renderSignals(signals) {
    const tbody = document.getElementById('signals-table');
    const emptyDiv = document.getElementById('signals-empty');

    if (!signals || signals.length === 0) {
        tbody.innerHTML = '';
        emptyDiv.style.display = 'block';
        return;
    }

    emptyDiv.style.display = 'none';
    tbody.innerHTML = signals.map(s => {
        const sideClass = (s.side || '').toUpperCase() === 'BUY' ? 'badge-buy' : 'badge-sell';
        const sideLabel = (s.side || '').toUpperCase() === 'BUY' ? '买入' : '卖出';
        return `<tr>
            <td style="font-family:monospace;font-size:0.78rem;">${esc(s.order_id)}</td>
            <td>${esc(s.ts_code)}</td>
            <td><span class="badge ${sideClass}">${sideLabel}</span></td>
            <td>${fmtPrice(s.price)}</td>
            <td>${fmtQty(s.quantity)}</td>
            <td style="font-size:0.78rem;">${esc(s.create_time)}</td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;" title="${esc(s.reason)}">${esc(s.reason)}</td>
            <td>
                <button class="btn btn-sm btn-green" onclick="confirmSignal('${esc(s.order_id)}', ${s.price}, ${s.quantity})">确认</button>
                <button class="btn btn-sm btn-red" onclick="rejectSignal('${esc(s.order_id)}')">拒绝</button>
            </td>
        </tr>`;
    }).join('');
}

async function confirmSignal(id, defaultPrice, defaultQty) {
    // Pre-fill the form
    document.getElementById('fill-order-id').value = id;
    document.getElementById('fill-price').value = defaultPrice || '';
    document.getElementById('fill-qty').value = defaultQty || '';
    showToast('请在东方财富App下单后录入成交信息，或直接点击提交确认', 'info');
}

async function rejectSignal(id) {
    const reason = prompt('拒绝原因（可选）：');
    if (reason === null) return; // cancelled

    try {
        const resp = await fetch(API_BASE + '/signals/' + encodeURIComponent(id) + '/reject', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason: reason || '用户手动拒绝' })
        });
        const json = await resp.json();
        if (json.status === 'success') {
            showToast('信号已拒绝: ' + id, 'success');
            loadSignals();
        } else {
            showToast('拒绝失败: ' + (json.detail || json.message || '未知错误'), 'error');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'error');
    }
}

async function submitFill() {
    const orderId = document.getElementById('fill-order-id').value.trim();
    const price = parseFloat(document.getElementById('fill-price').value);
    const qty = parseInt(document.getElementById('fill-qty').value);

    if (!orderId) { showToast('请输入订单ID', 'error'); return; }
    if (!price || price <= 0) { showToast('请输入有效的成交价', 'error'); return; }
    if (!qty || qty <= 0) { showToast('请输入有效的成交数量', 'error'); return; }

    try {
        const resp = await fetch(API_BASE + '/signals/' + encodeURIComponent(orderId) + '/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fill_price: price, fill_qty: qty })
        });
        const json = await resp.json();
        if (json.status === 'success') {
            showToast('成交确认成功! ' + orderId + ' @ ' + fmtPrice(price) + ' x ' + fmtQty(qty), 'success');
            document.getElementById('fill-order-id').value = '';
            document.getElementById('fill-price').value = '';
            document.getElementById('fill-qty').value = '';
            loadSignals();
            loadDashboard();
        } else {
            showToast('确认失败: ' + (json.detail || json.message || '未知错误'), 'error');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'error');
    }
}

function startSignalAutoRefresh() {
    stopSignalAutoRefresh();
    signalAutoRefreshTimer = setInterval(loadSignals, 15000); // 15s
}

function stopSignalAutoRefresh() {
    if (signalAutoRefreshTimer) {
        clearInterval(signalAutoRefreshTimer);
        signalAutoRefreshTimer = null;
    }
}

async function loadStrategies() {
    try {
        const resp = await fetch(API_BASE + '/strategies');

        if (json.status === 'success') {
            renderStrategies(json.data);

function renderStrategies(data) {
    const strategies = data.strategies || {};
    const profiles = data.profiles || {};
    const activeProfile = data.active_profile || 'default';

    // Render strategy list
    const catLabels = {
        'multi_factor': '多因子', 'ai_ml': 'AI/ML', 'hybrid': '混合',
        'trend': '趋势', 'contrarian': '反转', 'fundamental': '基本面',
        'risk': '风险', 'intraday': '盘中'
    };

    let stratHTML = '';
    const activeStratKeys = data.active_strategies || [];
    for (const [key, info] of Object.entries(strategies)) {
        const cat = info.category || '';
        const catLabel = catLabels[cat] || cat;
        const checked = activeStratKeys.length === 0 || activeStratKeys.includes(key) ? 'checked' : '';
        stratHTML += `
            <div class="profile-card strat-card-selectable" onclick="toggleStratCheck(this, '${esc(key)}')">
                <div style="display:flex;align-items:flex-start;gap:10px;">
                    <input type="checkbox" class="strat-checkbox" data-key="${esc(key)}" ${checked} style="margin-top:4px;accent-color:var(--blue);cursor:pointer;" onclick="event.stopPropagation();toggleStratCheck(this.parentElement.parentElement,'${esc(key)}')">
                    <div style="flex:1;">
                        <div class="name">${esc(info.name)}</div>
                        <div class="detail">${esc(info.description)}</div>
                        <div class="detail" style="margin-top:6px;">
                            <span class="badge" style="background:#1e3a5f;color:#93c5fd;">${catLabel}</span>
                            <code style="font-size:0.72rem;color:var(--text-dim);">${esc(key)}</code>
                        </div>
                    </div>
                </div>
            </div>`;
    }
    document.getElementById('strategy-grid').innerHTML = stratHTML;

    // Render profiles
    const profileStrategyNames = {};
    try {
        // Try to build friendly names from the strategy data
        for (const [key, info] of Object.entries(strategies)) {
            profileStrategyNames[key] = info.name;
        }
    } catch(e) {}

    let profileHTML = '';
    for (const [key, profile] of Object.entries(profiles)) {
        const isActive = key === activeProfile;
        const strategyNames = (profile.strategies || []).map(s => profileStrategyNames[s] || s).join(', ');
        profileHTML += `
            <div class="profile-card${isActive ? ' selected' : ''}" onclick="selectProfile('${esc(key)}')" id="profile-${esc(key)}">
                <div class="name">${isActive ? '✅ ' : ''}${esc(profile.name)}</div>
                <div class="detail">
                    策略: ${esc(strategyNames)}<br>
                    仓位: ${(profile.position_ratio * 100).toFixed(0)}% |
                    止损: ${(profile.stop_loss * 100).toFixed(0)}%
                </div>
            </div>`;
    }
    document.getElementById('profiles-grid').innerHTML = profileHTML;

    // Update manual lock badge
    const lock = data.manual_lock || {};
    const badge = document.getElementById('manual-lock-badge');
    if (lock.enabled && lock.profile) {
        badge.textContent = '🔒 已锁定: ' + (lock.profile);
    } else {
        badge.textContent = '🔄 自动检测';
    }
}

function selectProfile(key) {
    selectedProfileKey = key;
    // Update UI selection
    document.querySelectorAll('#profiles-grid .profile-card').forEach(c => c.classList.remove('selected'));
    const card = document.getElementById('profile-' + key);
    if (card) card.classList.add('selected');
}

function toggleStratCheck(cardEl, key) {
    const checkbox = cardEl.querySelector('.strat-checkbox');
    if (checkbox) {
        checkbox.checked = !checkbox.checked;
        if (checkbox.checked) {
            cardEl.style.borderColor = 'var(--blue)';
            cardEl.style.background = '#1e3a5f';
        } else {
            cardEl.style.borderColor = '';
            cardEl.style.background = '';
        }
    }
}

async function applyCustomStrategies() {
    const checkboxes = document.querySelectorAll('.strat-checkbox:checked');
    const strategies = [];
    checkboxes.forEach(cb => { strategies.push(cb.getAttribute('data-key')); });
    if (strategies.length === 0) {
        showToast('请至少勾选一个策略', 'error');
        return;
    }
    try {
        const resp = await fetch(API_BASE + '/strategies/profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ strategies: strategies })
        });
        const json = await resp.json();
        if (json.status === 'success') {
            showToast(json.data.message || '策略组合已更新', 'success');
            document.getElementById('custom-strat-hint').textContent = '当前: 自定义组合 (' + strategies.length + '个策略)';
            loadStrategies();
        } else {
            showToast('应用失败: ' + (json.detail || json.message || '未知错误'), 'error');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'error');
    }
}

async function applySelectedProfile() {
    if (!selectedProfileKey) {
        showToast('请先选择一个市场环境预设', 'error');
        return;
    }
    try {
        const resp = await fetch(API_BASE + '/strategies/profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ profile: selectedProfileKey })
        });
        const json = await resp.json();
        if (json.status === 'success') {
            showToast(json.data.message || '配置已更新', 'success');
            loadStrategies();
        } else {
            showToast('切换失败: ' + (json.detail || json.message || '未知错误'), 'error');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'error');
    }
}

async function resetProfile() {
    try {
        const resp = await fetch(API_BASE + '/strategies/profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reset: true })
        });
        const json = await resp.json();
        if (json.status === 'success') {
            showToast('已恢复自动检测模式', 'success');
            selectedProfileKey = null;
            loadStrategies();
        } else {
            showToast('重置失败: ' + (json.detail || json.message || '未知错误'), 'error');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'error');
    }
}

// ============================================================

function showToast(msg, type) {
    type = type || 'info';
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// ============================================================
// Auto-Refresh
// ============================================================

function startAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    let countdown = 30;
    document.getElementById('refresh-countdown').textContent = countdown + 's';

    autoRefreshTimer = setInterval(() => {
        countdown--;
        document.getElementById('refresh-countdown').textContent = countdown + 's';
        if (countdown <= 0) {
            countdown = 30;
            // Only refresh dashboard tab if it's visible
            const dashPanel = document.getElementById('panel-dashboard');
            if (dashPanel && dashPanel.classList.contains('active')) {
                loadDashboard();
            }
        }
    }, 1000);
}

let btStockPool = ['600519', '000858', '002415', '300015', '300750'];
const btStockNames = {'600519':'贵州茅台','000858':'五粮液','601398':'工商银行','000001':'平安银行','002415':'海康威视','002230':'科大讯飞','300015':'爱尔眼科','300750':'宁德时代','002371':'北方华创','002410':'广联达','002352':'顺丰控股','002399':'海普瑞','002421':'达实智能','601288':'农业银行','000568':'泸州老窖','600887':'伊利股份','300763':'亿纬锂能','002459':'晶澳科技','600276':'恒瑞医药'};
const btPresets = {
    mixed: ['600519','002415','002371','002410','300015'],
    bluechip: ['600519','000858','601398','000001','600036'],
    tech: ['002415','002230','300015','300750','300763'],
    smallcap: ['002371','002410','002352','002399','002421'],
    consumer: ['600519','000858','600887','000568','603288']
};
let btCurrentTaskId = null;
let btCurrentStrategy = 'eight_factor';

function btGetSavedPools() { try { return JSON.parse(localStorage.getItem('bt_saved_pools')||'{}'); } catch(e) { return {}; } }
function btSavePoolsToStorage(pools) { localStorage.setItem('bt_saved_pools', JSON.stringify(pools)); }

function btRenderPool() {
    const tags = document.getElementById('bt-stock-tags');
    const saved = document.getElementById('bt-saved-pools');
    tags.innerHTML = btStockPool.map(c => '<span style="background:#1e3a5f;color:#93c5fd;padding:2px 8px;border-radius:12px;font-size:0.78rem;cursor:pointer;">'+(btStockNames[c]||c)+' <span onclick="btRemoveStock(\''+c+'\')" style="color:var(--red);margin-left:4px;">x</span></span>').join('');

    const pools = btGetSavedPools();
    if (Object.keys(pools).length === 0) { saved.innerHTML = '<span style="color:var(--text-dim);font-size:0.72rem;">暂无保存的股票池</span>'; return; }
    saved.innerHTML = Object.entries(pools).map(([n,codes]) => '<span style="cursor:pointer;color:var(--blue);margin-right:8px;" onclick="btLoadSavedPool(\''+n+'\')" title="'+codes.join(',')+'">'+esc(n)+' ('+codes.length+'只)</span> <span style="cursor:pointer;color:var(--red);font-size:0.7rem;" onclick="event.stopPropagation();btDeletePool(\''+n+'\')">[x]</span>').join('');
    localStorage.setItem('bt_last_pool', JSON.stringify(btStockPool));
}

function btLoadPreset() { const v = document.getElementById('bt-preset-pool').value; if (v && btPresets[v]) { btStockPool = [...btPresets[v]]; btRenderPool(); } }
function btAddStock() { const inp = document.getElementById('bt-stock-input'); const code = inp.value.trim(); if (!/^\d{6}$/.test(code)) { showToast('请输入6位数字代码','error'); return; } if (btStockPool.includes(code)) { showToast('已在池中','error'); return; } btStockPool.push(code); btRenderPool(); inp.value = ''; }
function btRemoveStock(code) { btStockPool = btStockPool.filter(c => c !== code); btRenderPool(); }
function btQuickAdd(code) { if (!btStockPool.includes(code)) { btStockPool.push(code); btRenderPool(); } }
function btClearPool() { btStockPool = []; btRenderPool(); }
function btSavePool() { const name = document.getElementById('bt-pool-name').value.trim(); if (!name) { showToast('请输入名称','error'); return; } if (btStockPool.length===0) { showToast('池为空','error'); return; } const pools = btGetSavedPools(); pools[name] = [...btStockPool]; btSavePoolsToStorage(pools); document.getElementById('bt-pool-name').value=''; btRenderPool(); showToast('已保存: '+name,'success'); }
function btLoadSavedPool(name) { const pools = btGetSavedPools(); if (pools[name]) { btStockPool = [...pools[name]]; btRenderPool(); } }
function btDeletePool(name) { const pools = btGetSavedPools(); delete pools[name]; btSavePoolsToStorage(pools); btRenderPool(); }

function btExportPool() {
    if (btStockPool.length===0) { showToast('池为空','error'); return; }
    const data = {name:'股票池导出',export_time:new Date().toISOString(),codes:btStockPool,count:btStockPool.length};
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'stock_pool_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}

function btImportPool(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let codes = [];
            const text = e.target.result;
            if (file.name.endsWith('.json')) { const d = JSON.parse(text); codes = d.codes || d.stock_pool || []; }
            else { codes = text.split(/[\n,]/).map(s=>s.trim()).filter(s=>/^\d{6}$/.test(s)); }
            if (codes.length===0) { showToast('未找到有效代码','error'); return; }
            btStockPool = [...new Set(codes)]; btRenderPool(); showToast('已导入 '+btStockPool.length+' 只','success');
        } catch(err) { showToast('导入失败: '+err.message,'error'); }
    };
    reader.readAsText(file);
}

async function btSyncFromLive() {
    try {
        const r = await fetch(API_BASE+'/pool/sync-from-live'); const d = await r.json();
        if (d.status==='success' && d.data.codes && d.data.codes.length>0) { btStockPool=[...d.data.codes]; btRenderPool(); showToast('已同步 '+btStockPool.length+' 只','success'); }
        else { showToast('实盘池为空','error'); }
    } catch(e) { showToast('同步失败','error'); }
}

async function btSyncToLive() {
    if (btStockPool.length===0) { showToast('池为空','error'); return; }
    try {
        const r = await fetch(API_BASE+'/pool/sync-to-live',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codes:btStockPool})});
        const d = await r.json();
        if (d.status==='success') showToast('已同步到实盘','success'); else showToast('失败: '+(d.message||''),'error');

function btRenderStrategyCards() {
    const strategies = {
        'eight_factor':'8因子选股','ai_factor':'AI因子挖掘','position':'位置判断','momentum':'动量策略','mean_reversion':'均值回归',
        'value':'价值策略','quality':'质量策略','low_volatility':'低波动防御','trend_following':'趋势跟随','sector_rotation':'板块轮动','intraday_reversal':'盘中反转'
    };
    let html = '';
    for (const [k,v] of Object.entries(strategies)) {
        const sel = btCurrentStrategy === k ? 'selected' : '';
        html += '<div class="profile-card strat-card-selectable '+sel+'" onclick="btSelectStrategy(\''+k+'\')" id="bt-strat-'+k+'" style="cursor:pointer;"><div class="name">'+v+'</div></div>';
    }
    html += '<div class="profile-card strat-card-selectable '+(btCurrentStrategy==='both'?'selected':'')+'" onclick="btSelectStrategy(\'both\')" id="bt-strat-both" style="cursor:pointer;"><div class="name">对比: 8因子 + 位置判断</div></div>';

function btSelectStrategy(key) {
    btCurrentStrategy = key;
    document.querySelectorAll('#bt-strategy-cards .profile-card').forEach(c => c.classList.remove('selected'));
    const card = document.getElementById('bt-strat-'+key);
    if (card) card.classList.add('selected');
}

// ============================================================
// Backtest: Execution
// ============================================================

async function runBacktest() {
    if (btStockPool.length === 0) { showToast('请先添加股票', 'error'); return; }
    const startDate = document.getElementById('bt-start').value.trim();
    const endDate = document.getElementById('bt-end').value.trim();
    const stopLoss = parseFloat(document.getElementById('bt-stoploss').value) / 100;
    const moveStop = parseFloat(document.getElementById('bt-movestop').value) / 100;

    document.getElementById('bt-loading-card').style.display = 'block';
    document.getElementById('bt-metrics-area').innerHTML = '';
    document.getElementById('bt-chart-card').style.display = 'none';
    document.getElementById('bt-ops-card').style.display = 'none';
    document.getElementById('bt-progress-msg').textContent = '提交回测...';
    document.getElementById('bt-progress-bar').style.width='10%';

    try {
        const resp = await fetch(API_BASE + '/backtest', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                stock_pool: btStockPool, start_date: startDate, end_date: endDate,
                strategy_type: btCurrentStrategy,
                initial_capital: parseFloat(document.getElementById('bt-capital').value) || 100000,
                max_position: parseInt(document.getElementById('bt-maxpos').value) || 5,
                stop_loss: stopLoss, move_stop: moveStop,
                rebalance_frequency: document.getElementById('bt-rebalance').value,
            })
        });
        const json = await resp.json();
        if (json.status !== 'success') { showToast('提交失败', 'error'); document.getElementById('bt-loading-card').style.display='none'; return; }
        btCurrentTaskId = json.task_id;
        await btPollTask();
    } catch (err) {
        document.getElementById('bt-loading-card').style.display = 'none';
        showToast('请求失败: ' + err.message, 'error');
    }
}

async function btPollTask() {
    for (let i = 0; i < 180; i++) {
        await new Promise(r => setTimeout(r, 1500));
        try {
            const resp = await fetch(API_BASE + '/tasks/' + btCurrentTaskId);
            const json = await resp.json();
            if (json.status !== 'success') continue;
            const task = json.data;
            document.getElementById('bt-progress-msg').textContent = task.message || '处理中...';
            document.getElementById('bt-progress-bar').style.width = (task.progress * 100) + '%';

            if (task.status === 'completed') {
                const r2 = await fetch(API_BASE + '/results/' + btCurrentTaskId);
                const d2 = await r2.json();
                if (d2.status === 'success') { btRenderResults(d2.data); }
                document.getElementById('bt-loading-card').style.display = 'none';
                showToast('回测完成!', 'success');
                return;
            }
            if (task.status === 'failed') {
                document.getElementById('bt-loading-card').style.display = 'none';
                showToast('回测失败: ' + (task.message||''), 'error');
                return;
            }
        } catch(e) {}
    }
    document.getElementById('bt-loading-card').style.display = 'none';
    showToast('回测超时', 'error');
}

// ============================================================
// Backtest: Results Rendering
// ============================================================

function btRenderResults(data) {
    const strategies = data.strategy_results || {};
    const firstKey = Object.keys(strategies)[0];
    if (!firstKey) return;

    // If 'both' was selected, use the first strategy for chart/ops
    if (btCurrentStrategy === 'both' && strategies[btCurrentStrategy]) {
        btCurrentStrategy = Object.keys(strategies)[0];
    } else if (!strategies[btCurrentStrategy]) {
        btCurrentStrategy = firstKey;
    }

    const sdata = strategies[btCurrentStrategy];
    if (!sdata) return;
    const m = sdata.metrics || {};

    // Metrics
    const strategyNames = {'eight_factor':'8因子选股','ai_factor':'AI因子','position':'位置判断','momentum':'动量','mean_reversion':'均值回归','value':'价值','quality':'质量','low_volatility':'低波动','trend_following':'趋势跟随','sector_rotation':'板块轮动','intraday_reversal':'盘中反转'};
    const label = strategyNames[btCurrentStrategy] || btCurrentStrategy;
    const returnClass = (m.total_return || 0) >= 0 ? 'green' : 'red';

    let metricsHTML = '';
    if (btCurrentStrategy !== 'both' && Object.keys(strategies).length > 1) {
        // Show strategy tabs
        metricsHTML += '<div style="display:flex;gap:8px;margin-bottom:12px;">';
        for (const [k, sd] of Object.entries(strategies)) {
            const sel = k === btCurrentStrategy ? 'btn-blue' : 'btn-outline';
            metricsHTML += '<button class="btn btn-sm '+sel+'" onclick="btSwitchStrat(\''+k+'\')">'+ (strategyNames[k]||k) +'</button>';
        }
        metricsHTML += '</div>';
    }

    metricsHTML += '<div class="metrics">';
    metricsHTML += '<div class="metric-card"><div class="metric-value" style="font-size:1rem;">'+label+'</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value '+returnClass+'">'+(m.total_return*100).toFixed(2)+'%</div><div class="metric-label">总收益率</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value">'+(m.annual_return*100).toFixed(2)+'%</div><div class="metric-label">年化收益</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value text-red">'+(m.max_drawdown*100).toFixed(2)+'%</div><div class="metric-label">最大回撤</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value">'+(m.sharpe_ratio||0).toFixed(2)+'</div><div class="metric-label">夏普比率</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value">'+(m.trade_win_rate*100).toFixed(1)+'%</div><div class="metric-label">交易胜率</div></div>';
    metricsHTML += '<div class="metric-card"><div class="metric-value">'+(m.total_trades||0)+'</div><div class="metric-label">交易次数</div></div>';
    metricsHTML += '</div>';
    document.getElementById('bt-metrics-area').innerHTML = metricsHTML;

    // Chart
    btRenderChart(strategies);

    // Daily operations
    btLoadDailyDates();
}

async function btRenderChart(strategies) {
    const chartCard = document.getElementById('bt-chart-card');
    chartCard.style.display = 'block';

    const traces = [];
    for (const [name, sdata] of Object.entries(strategies)) {
        const nav = sdata.daily_nav || [];
        if (nav.length === 0) continue;
        const dates = nav.map(d => d.date);
        const values = nav.map(d => d.total_value);
        const initial = values[0] || 1;
        const navNorm = values.map(v => v / initial);
        const label = name === 'eight_factor' ? '8因子' : name === 'position' ? '位置判断' : name;
        traces.push({x: dates, y: navNorm, type: 'scatter', mode: 'lines', name: label, line: {width: 2}});
    }

    const layout = {
        height: 380, showlegend: true, hovermode: 'x unified',
        xaxis: {title: '日期', gridcolor: '#334155'},
        yaxis: {title: '净值', gridcolor: '#334155'},
        paper_bgcolor: '#1e293b', plot_bgcolor: '#1e293b',
        font: {color: '#e2e8f0'},
        margin: {l: 50, r: 20, t: 10, b: 50}
    };

    try { Plotly.newPlot('bt-chart', traces, layout, {displayModeBar: false, responsive: true}); }
    catch(e) { document.getElementById('bt-chart').innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:40px;">图表加载失败</div>'; }
}

function btSwitchStrat(key) {
    btCurrentStrategy = key;
    fetch(API_BASE + '/results/' + btCurrentTaskId).then(r => r.json()).then(d => {
        if (d.status === 'success') {
            const sdata = d.data.strategy_results[key];
            if (sdata) {
                const m = sdata.metrics || {};
                const returnClass = (m.total_return || 0) >= 0 ? 'green' : 'red';
                const strategyNames = {'eight_factor':'8因子选股','ai_factor':'AI因子','position':'位置判断','momentum':'动量','mean_reversion':'均值回归','value':'价值','quality':'质量','low_volatility':'低波动','trend_following':'趋势跟随','sector_rotation':'板块轮动','intraday_reversal':'盘中反转'};
                const label = strategyNames[key] || key;
                let h = '';
                h += '<div style="display:flex;gap:8px;margin-bottom:12px;">';
                for (const [k, sd] of Object.entries(d.data.strategy_results)) {
                    const sel = k === key ? 'btn-blue' : 'btn-outline';
                    h += '<button class="btn btn-sm '+sel+'" onclick="btSwitchStrat(\''+k+'\')">'+ (strategyNames[k]||k) +'</button>';
                }
                h += '</div>';
                h += '<div class="metrics">';
                h += '<div class="metric-card"><div class="metric-value" style="font-size:1rem;">'+label+'</div></div>';
                h += '<div class="metric-card"><div class="metric-value '+returnClass+'">'+(m.total_return*100).toFixed(2)+'%</div><div class="metric-label">总收益率</div></div>';
                h += '<div class="metric-card"><div class="metric-value">'+(m.annual_return*100).toFixed(2)+'%</div><div class="metric-label">年化收益</div></div>';
                h += '<div class="metric-card"><div class="metric-value text-red">'+(m.max_drawdown*100).toFixed(2)+'%</div><div class="metric-label">最大回撤</div></div>';
                h += '<div class="metric-card"><div class="metric-value">'+(m.sharpe_ratio||0).toFixed(2)+'</div><div class="metric-label">夏普比率</div></div>';
                h += '<div class="metric-card"><div class="metric-value">'+(m.trade_win_rate*100).toFixed(1)+'%</div><div class="metric-label">交易胜率</div></div>';
                h += '<div class="metric-card"><div class="metric-value">'+(m.total_trades||0)+'</div><div class="metric-label">交易次数</div></div>';
                h += '</div>';
                document.getElementById('bt-metrics-area').innerHTML = h;
                btLoadDailyDates();
            }
        }
    });
}

// ============================================================
// Backtest: Daily Operations Detail
// ============================================================

async function btLoadDailyDates() {
    document.getElementById('bt-ops-card').style.display = 'block';
    try {
        const r = await fetch(API_BASE + '/results/' + btCurrentTaskId + '/daily?strategy=' + btCurrentStrategy);
        const d = await r.json();
        const dates = d.data || [];
        const sel = document.getElementById('bt-date-selector');
        sel.innerHTML = dates.map(dt => '<option value="'+dt+'">'+dt.replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3')+'</option>').join('');
        if (dates.length > 0) btLoadDailyOps();
    } catch(e) { console.error('Load daily dates failed', e); }
}

async function btLoadDailyOps() {
    const date = document.getElementById('bt-date-selector').value;
    if (!date) return;
    try {
        const r = await fetch(API_BASE + '/results/' + btCurrentTaskId + '/daily?strategy=' + btCurrentStrategy + '&date=' + date);
        const d = await r.json();
        const op = d.data;
        if (!op) { document.getElementById('bt-daily-ops').innerHTML = '<div style="padding:20px;color:var(--text-dim);">无数据</div>'; return; }

        let html = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;font-size:0.85rem;">';
        html += '<span><strong>总资产:</strong> '+fmtMoney(op.portfolio_value)+'</span>';
        html += '<span><strong>现金:</strong> '+fmtMoney(op.cash)+'</span>';
        html += '<span><strong>持仓:</strong> '+op.position_count+'只</span>';
        html += '<span><strong>累计收益:</strong> <span class="'+(op.cumulative_return>=0?'text-green':'text-red')+'">'+(op.cumulative_return*100).toFixed(2)+'%</span></span>';
        html += '</div>';

        if (op.sells && op.sells.length > 0) {
            html += '<div style="margin-bottom:8px;color:var(--red);font-weight:600;">卖出 ('+op.sells.length+'笔)</div>';
            html += '<table><thead><tr><th>代码</th><th>名称</th><th>价格</th><th>数量</th><th>金额</th><th>原因</th></tr></thead><tbody>';
            op.sells.forEach(s => { html += '<tr><td>'+esc(s.ts_code)+'</td><td>'+esc(s.name||'')+'</td><td>'+fmtPrice(s.price)+'</td><td>'+fmtQty(s.quantity)+'</td><td>'+fmtMoney(s.amount)+'</td><td style="font-size:0.78rem;">'+esc(s.reason||'')+'</td></tr>'; });
            html += '</tbody></table>';
        }

        if (op.buys && op.buys.length > 0) {
            html += '<div style="margin-bottom:8px;margin-top:12px;color:var(--green);font-weight:600;">买入 ('+op.buys.length+'笔)</div>';
            html += '<table><thead><tr><th>代码</th><th>名称</th><th>价格</th><th>数量</th><th>金额</th><th>原因</th></tr></thead><tbody>';
            op.buys.forEach(b => { html += '<tr><td>'+esc(b.ts_code)+'</td><td>'+esc(b.name||'')+'</td><td>'+fmtPrice(b.price)+'</td><td>'+fmtQty(b.quantity)+'</td><td>'+fmtMoney(b.amount)+'</td><td style="font-size:0.78rem;">'+esc(b.reason||'')+'</td></tr>'; });
            html += '</tbody></table>';
        }

        if (op.holds && op.holds.length > 0) {
            html += '<div style="margin-bottom:8px;margin-top:12px;font-weight:600;">持仓 ('+op.holds.length+'只)</div>';
            html += '<table><thead><tr><th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th></tr></thead><tbody>';
            op.holds.forEach(h => { const pc = (h.profit_rate||0)>=0?'text-green':'text-red'; html += '<tr><td>'+esc(h.ts_code)+'</td><td>'+esc(h.name||'')+'</td><td>'+fmtQty(h.quantity)+'</td><td>'+fmtPrice(h.cost_price)+'</td><td>'+fmtPrice(h.current_price)+'</td><td class="'+pc+'">'+((h.profit_rate||0)*100).toFixed(2)+'%</td></tr>'; });
            html += '</tbody></table>';
        }

        if ((!op.sells||op.sells.length===0) && (!op.buys||op.buys.length===0) && (!op.holds||op.holds.length===0)) {
            html += '<div style="padding:20px;color:var(--text-dim);text-align:center;">今日无操作</div>';
        }

        document.getElementById('bt-daily-ops').innerHTML = html;
    } catch(e) { document.getElementById('bt-daily-ops').innerHTML = '<div style="color:var(--red);">加载失败</div>'; }
}

// ============================================================
// Formatting Helpers
// ============================================================

function fmtMoney(val) {
    if (val == null || isNaN(val)) return '0';
    return Number(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPrice(val) {
    if (val == null || isNaN(val)) return '0.00';
    return Number(val).toFixed(2);
}

function fmtQty(val) {
    if (val == null || isNaN(val)) return '0';
    return Number(val).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function fmtNum(val) {
    if (val == null || isNaN(val)) return '0';
    return Number(val).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
