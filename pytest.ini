[pytest]
testpaths = tests/unit tests/integration
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Real data tests may need longer timeouts
timeout = 120

# Markers
markers =
    slow: Tests that make network requests (AKShare API calls)
    real_data: Tests that require real market data
    e2e: Browser end-to-end tests
    smoke: Fast smoke tests for quick validation

# Output
addopts = -v --tb=short --strict-markers
